# DigitalOcean App Platform — تطبيق المقسم (Atheer Switch)
# استبدل YOUR_GITHUB_USER/YOUR_REPO بالمستودع الفعلي قبل الرفع.
# أضف مورد Redis من لوحة DO واربط REDIS_HOST / REDIS_PASS أو REDIS_URL كمتغيرات RUN_TIME.
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: atheer-switch

region: fra

services:
  - name: api
    github:
      repo: ahmedaliahmed775/atheer-switch-backend
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_SSL
        value: "true"
      - key: API_KEY_HEADER
        value: x-atheer-api-key
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_HOST
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_PORT
        scope: RUN_TIME
        value: "6379"
      - key: REDIS_PASS
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_TLS
        scope: RUN_TIME
        value: "false"
      - key: JAWALI_API_URL
        scope: RUN_TIME
        value: https://api.jawali.com/v1
      - key: JAWALI_AGENT_WALLET
        scope: RUN_TIME
        type: SECRET
      - key: JAWALI_API_KEY
        scope: RUN_TIME
        type: SECRET

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
